{% extends 'base.html' %}

{% block title %}登录 - 信息发布平台{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg">
                <div class="card-header bg-primary text-white text-center py-4">
                    <h3 class="mb-0">🔐 用户登录</h3>
                </div>
                <div class="card-body p-5">
                    <form method="POST">
                        <div class="mb-4">
                            <label for="username" class="form-label">用户名</label>
                            <input type="text" class="form-control form-control-lg" id="username" name="username" required placeholder="请输入用户名">
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label">密码</label>
                            <input type="password" class="form-control form-control-lg" id="password" name="password" required placeholder="请输入密码">
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">登录</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center py-3">
                    <p class="mb-0">还没有账号？<a href="{{ url_for('register') }}" class="text-primary">立即注册</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
